<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Access</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#08080f;color:#e2e8f0;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.wrap{max-width:420px;width:100%;text-align:center}
.badge{display:inline-block;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:3px;border:1px solid #f97316;color:#f97316;padding:3px 14px;border-radius:2px;margin-bottom:20px;text-transform:uppercase}
h1{font-family:'Space Mono',monospace;font-size:28px;color:#fff;margin-bottom:8px}
h1 span{color:#f97316}
.sub{font-size:13px;color:#64748b;margin-bottom:32px}
.links{display:flex;flex-direction:column;gap:12px}
a.dash{display:flex;align-items:center;justify-content:space-between;background:#111827;border:1px solid #1e2433;border-radius:12px;padding:20px 24px;text-decoration:none;transition:border-color .2s}
a.dash:hover{border-color:#f97316}
.dash-info .label{font-size:10px;color:#64748b;font-family:'Space Mono',monospace;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.dash-info .title{font-size:15px;font-weight:600;color:#fff}
.arr{color:#f97316;font-size:18px}
</style>
</head>
<body>
<div class="wrap">
  <div class="badge">Teacher Access</div>
  <h1>Teacher <span>Dashboard</span></h1>
  <p class="sub">View student submissions and results.</p>
  <div class="links">
    <a class="dash" href="./media_teacher_dashboard.html">
      <div class="dash-info">
        <div class="label">Current Test</div>
        <div class="title">Media &amp; Communication</div>
      </div>
      <div class="arr">→</div>
    </a>
  </div>
</div>
</body>
</html>
